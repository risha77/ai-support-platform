spring:
  application:
    name: chat-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/support_db}
    username: ${SPRING_DATASOURCE_USERNAME:support_user}
    password: ${SPRING_DATASOURCE_PASSWORD:support_pass}
  jpa:
    hibernate:
      ddl-auto: update   # use validate or none in production
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: 6379
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: chat-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.support.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8081

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:your-api-key-here}
    base-url: https://api.anthropic.com
    model: claude-sonnet-4-6

kafka:
  topics:
    chat-events: chat-events
    ticket-events: ticket-events

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      knowledge-service:
        connectTimeout: 3000
        readTimeout: 5000
